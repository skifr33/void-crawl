<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- ── VIEWPORT: kills scroll/zoom, iOS safe areas ── -->
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
             user-scalable=no, viewport-fit=cover" />

  <!-- ── PWA / Add to Home Screen ── -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="VOID CRAWL" />
  <meta name="application-name" content="VOID CRAWL" />
  <meta name="theme-color" content="#020402" />

  <!-- ── SEO / Share ── -->
  <meta name="description"
    content="A Mork Borg-inspired solo sci-fi dungeon crawler. 10 decks. One operative. Probably dead." />

  <!-- ── PWA Manifest ── -->
  <link rel="manifest" href="/manifest.json" />

  <!-- ── iOS Icons (generate with realfavicongenerator.net) ── -->
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />
  <link rel="icon" type="image/png" sizes="32x32"  href="/icons/icon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16"  href="/icons/icon-16.png" />

  <!-- ── Fonts ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />

  <title>VOID CRAWL</title>

  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #020402;
      color: #39ff14;
      font-family: 'VT323', 'Courier New', monospace;
      overscroll-behavior: none;
      overflow-x: hidden;
      /* iOS safe area insets */
      padding-top:    env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left:   env(safe-area-inset-left);
      padding-right:  env(safe-area-inset-right);
    }

    /* Prevent iOS bounce scroll */
    body {
      position: fixed;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    #root {
      min-height: 100%;
    }

    /* Prevent text selection on tap */
    * { -webkit-tap-highlight-color: transparent; user-select: none; }

    /* Allow text selection in log areas */
    .selectable { user-select: text; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- ── Service Worker Registration (production only) ── -->
  <script>
    if ('serviceWorker' in navigator && location.hostname !== 'localhost') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('[SW] Registered:', reg.scope))
          .catch(err => console.warn('[SW] Registration failed:', err));
      });
    } else if (location.hostname === 'localhost') {
      // Dev: unregister any stale SW so it never serves cached files
      navigator.serviceWorker?.getRegistrations().then(regs => {
        regs.forEach(r => r.unregister());
      });
    }
  </script>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
